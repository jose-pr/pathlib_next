site_name: pathlib_next
site_description: Generic Path Protocol based pathlib
site_url: https://jose-pr.github.io/pathlib_next/
repo_url: https://github.com/jose-pr/pathlib_next
repo_name: jose-pr/pathlib_next
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Guides:
      - Schemes: guides/schemes.md
      - Extending: guides/extending.md
  - Benchmarks: benchmarks.md
  - Divergences from pathlib: divergences.md
  - API Reference:
      - Core Path: api/path.md
      - URI & Schemes: api/uri.md
      - Memory Path: api/mempath.md
      - Utilities: api/utils.md
      - Testing Contracts: api/testing.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - tables
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
